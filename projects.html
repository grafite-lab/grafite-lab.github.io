<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grafite Lab — Projects</title>
<meta name="description" content="Projects funded by Grafite Lab.">
<style>
  :root{
    --bg:#fdfdfe;
    --fg:#1c1e21;
    --muted:#767a82;
    --accent:#5b8def;
    --rule:#e4e8ef;
    --sans: "Inter", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  }

  *{box-sizing:border-box}

  html{background:var(--bg)}

  body{
    max-width:620px;
    margin:0 auto;
    padding:5em 1.5em 6em;
    font-family:var(--sans);
    font-size:18px;
    line-height:1.65;
    color:var(--fg);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
  }

  header{margin-bottom:3em}

  .mark{
    font-size:.72em;
    font-weight:600;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0 0 .9em;
  }

  h1{
    font-size:2.2em;
    line-height:1.15;
    margin:0 0 .35em;
    font-weight:700;
    letter-spacing:-.02em;
  }

  .tagline{
    margin:0;
    color:var(--muted);
    font-size:1.1em;
    font-weight:400;
  }

  p{margin:0 0 1.3em}

  a{
    color:var(--accent);
    text-decoration:none;
    border-bottom:1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    transition:border-color .15s ease, color .15s ease;
  }

  a:hover{border-color:var(--accent)}

  .back{
    display:inline-block;
    margin-top:2em;
    font-size:.9em;
  }

  ::selection{background:color-mix(in srgb, var(--accent) 25%, transparent)}

  @media (max-width:480px){
    body{font-size:16.5px;padding:3.5em 1.25em 5em}
    h1{font-size:1.8em}
  }
</style>
</head>
<body>

<header>
  <p class="mark">Grafite Lab</p>
  <h1>Projects</h1>
  <p class="tagline">To be published.</p>
</header>

<p>We're just getting started. The first grants are being decided now, and this page will list what they turn into once they exist outside a notebook.</p>

<a class="back" href="index.html">&larr; back</a>

</body>
</html>
