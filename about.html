<link rel="icon" type="image/png" href="favicon.png">

<style>
body{
    max-width:640px;
    margin:0 auto;
    padding:6em 1.5em 8em;
    font-family:Georgia, serif;
    font-size:17px;
    line-height:1.6;
    color:#292929;
    background:#f5f5f5;
  }
h1{
    font-size:1.4em;
    font-weight:normal;
    display:flex;
    align-items:center;
    gap:.5em;
  }
h1 img{
    width:1.4em;
    height:1.4em;
  }
a{color:#1656cc}
nav{
    display:flex;
    gap:1.5em;
    margin:-2.5em 0 2.5em;
    font-size:.95em;
  }
nav a{
    color:#292929;
    text-decoration:none;
    padding-bottom:.15em;
    border-bottom:2px solid transparent;
  }
nav a:hover, nav a.active{
    color:#1656cc;
    border-bottom-color:#1656cc;
  }
.people{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:1.5em;
    margin:2em 0;
    padding:0;
    list-style:none;
  }
.people li{
    text-align:center;
  }
.people img{
    width:64px;
    height:64px;
    object-fit:cover;
    border-radius:50%;
    background:#e2e2e2;
    display:block;
    margin:0 auto;
  }
.people .name{
    margin-top:.6em;
    font-size:.85em;
  }
.socials{
    display:flex;
    justify-content:center;
    gap:.4em;
    margin-top:.5em;
    padding:0;
    list-style:none;
  }
.socials a{
    width:24px;
    height:24px;
    border-radius:50%;
    background:#fff;
    border:1px solid #e0e0e0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
.socials a:hover{
    border-color:#1656cc;
  }
.socials svg{
    width:12px;
    height:12px;
    fill:#292929;
  }
.socials a:hover svg{
    fill:#1656cc;
  }
@media (max-width:480px){
.people{grid-template-columns:repeat(2, 1fr)}
  }
@media (max-width:480px){
body{font-size:17px;padding:4em 1.25em 6em}
  }
</style>
</head>
